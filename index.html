<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自我之路</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
        #infobox {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 20px 40px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 24px;
            z-index: 9999;
            text-align: center;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #1a1a2e;
        }
        #progress {
            width: 200px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin-top: 15px;
        }
        #progress::-webkit-progress-bar { background: #333; border-radius: 4px; }
        #progress::-webkit-progress-value { background: #4CAF50; border-radius: 4px; }
        #status {
            font-size: 14px;
            color: #aaa;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="infobox">
        <div>Loading, please wait...</div>
        <progress id="progress" value="0" max="100"></progress>
        <div id="status">Initializing...</div>
    </div>

    <canvas id="canvas"></canvas>

    <!-- 本地加载依赖 -->
    <script src="browserfs.min.js"></script>
    <script src="pythons.js" type="module" id="site"
            data-python="python3.12"
            data-LINES="42"
            data-COLUMNS="132"
            data-os="vtx,snd,gui"
            async defer>
    </script>

    <script>
        window.config = {
            xtermjs: "1",
            _sdl2: "canvas",
            user_canvas: 1,
            user_canvas_managed: 0,
            gui_divider: 2,
            ume_block: 0,
            can_close: 0,
            archive: "final.project.web",
            gui_debug: 2,
            cdn: "",
            autorun: 0,
            PYBUILD: "3.12",
            fb_ar: 1.77,
            fb_width: "1280",
            fb_height: "720"
        };

        window.show_infobox = function() {
            document.getElementById('infobox').style.display = 'block';
        };

        window.custom_onload = function() {
            console.log('custom_onload');
            document.getElementById('status').textContent = 'Ready';
        };

        window.update_progress = function(value, max) {
            const prog = document.getElementById('progress');
            if (prog) { prog.value = value; prog.max = max; }
        };

        window.get_canvas = function() {
            return document.getElementById('canvas');
        };
    </script>
</body>
</html>
